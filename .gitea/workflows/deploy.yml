name: CI/CD Pipeline - Build, Scan, Push, Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------
      # 🐳 Docker Login
      # --------------------
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # --------------------
      # 🏗️ Build Images
      # --------------------
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      # --------------------
      # 🔍 Security Scan (Trivy)
      # --------------------
      - name: Install Trivy
        run: |
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      - name: Scan Backend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Scan Frontend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # --------------------
      # 📤 Push Images
      # --------------------
      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # --------------------
      # ☸️ Deploy to Kubernetes (Minikube or cluster)
      # --------------------
      # --------------------
# ☸️ Deploy to VPS via SSH
# --------------------
      - name: Deploy to Kubernetes on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/sherlock-logs

            echo "Pulling latest images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend:latest

            echo "Applying Kubernetes manifests..."
            kubectl apply -f k8s/

            echo "Restarting deployments..."
            kubectl rollout restart deployment backend
            kubectl rollout restart deployment frontend